<div class="signup-page">
  <div class="signup-card">
    <div class="header-group">
      <h1>Signup</h1>
      <!-- <p class="subtitle">Create your account with secure credentials and a red wine inspired theme.</p> -->
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="signup-form">
      <p-floatlabel  variant="on">
        <input id="email" pInputText type="email" formControlName="userEmail" class="field" />
        <label for="email">Email</label>
      </p-floatlabel>
      <div class="field-feedback" *ngIf="userEmail?.invalid && (userEmail?.dirty || userEmail?.touched)">
        <span *ngIf="userEmail?.errors?.['required']">Email is required.</span>
        <span *ngIf="userEmail?.errors?.['email']">Enter a valid email address.</span>
      </div>

      <p-floatlabel  variant="on">
        <input id="username" pInputText type="text" formControlName="userName" class="field" />
        <label for="username">Username</label>
      </p-floatlabel>
      <div class="field-feedback" *ngIf="userName?.invalid && (userName?.dirty || userName?.touched)">
        <span *ngIf="userName?.errors?.['required']">Username is required.</span>
      </div>

      <p-floatlabel  variant="on">
        <p-password formControlName="password" [toggleMask]="true" inputId="password" class="field"></p-password>
        <label for="password">Password</label>
      </p-floatlabel>

      <div class="field-feedback" *ngIf="password?.invalid && (password?.dirty || password?.touched)">
        <span *ngIf="password?.errors?.['required']">Password is required.</span>
        <span *ngIf="password?.errors?.['minlength']">Password must be at least 8 characters.</span>
      </div>

      <button pButton type="submit" label="Create Account" class="submit-btn" [disabled]="signupForm.invalid"></button>

      <div *ngIf="submittedMessage" class="success-box">
        {{ submittedMessage }}
      </div>
    </form>
  </div>
</div>
